<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#00d4ff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ClearVoice AI" />

    <!-- Primary SEO -->
    <title>ClearVoice AI — Remove Background Noise from Video Free</title>
    <meta name="description" content="Remove background noise, wind, echo &amp; hum from any video or audio in seconds. AI-powered voice enhancement that runs entirely in your browser. No uploads, no data shared." />
    <meta name="keywords" content="remove background noise, AI noise removal, voice cleaner online, audio enhancement, noise cancellation, video noise removal, background noise remover, speech enhancement, wind noise removal, echo removal" />
    <link rel="canonical" href="https://voiceclean.vercel.app/" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="ClearVoice AI" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ClearVoice AI" />
    <meta property="og:title" content="ClearVoice AI — Remove Background Noise Instantly" />
    <meta property="og:description" content="Upload any video and AI removes wind, traffic, echo &amp; hum in seconds. Studio-quality voice clarity, free in your browser. Your files never leave your device." />
    <meta property="og:url" content="https://voiceclean.vercel.app/" />
    <meta property="og:image" content="https://voiceclean.vercel.app/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ClearVoice AI - AI background noise removal running in the browser" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ClearVoice AI — Remove Background Noise Free" />
    <meta name="twitter:description" content="AI removes wind, traffic, echo &amp; hum from your videos in seconds. Runs 100% in your browser. Free to start." />
    <meta name="twitter:image" content="https://voiceclean.vercel.app/og-image.png" />
    <meta name="twitter:image:alt" content="ClearVoice AI noise removal tool" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ClearVoice AI",
      "url": "https://voiceclean.vercel.app",
      "logo": {
        "@type": "ImageObject",
        "url": "https://voiceclean.vercel.app/favicon.svg"
      },
      "description": "AI-powered background noise removal and voice enhancement that processes entirely in your browser using Demucs v4 neural network."
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ClearVoice AI",
      "applicationCategory": "MultimediaApplication",
      "applicationSubCategory": "Audio Enhancement",
      "operatingSystem": "Web Browser",
      "url": "https://voiceclean.vercel.app",
      "description": "Remove background noise from video and audio using AI. Supports MP4, MOV, MP3, WAV. Runs entirely in your browser — no server uploads, complete privacy.",
      "featureList": [
        "AI background noise removal using Demucs v4",
        "Wind noise elimination",
        "Echo and reverb reduction",
        "Electrical hum removal",
        "Traffic and crowd noise removal",
        "Voice boost and volume balancing",
        "Browser-based processing with no data uploaded",
        "MP4 video export",
        "GPU-accelerated processing when available"
      ],
      "offers": [
        { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "INR" },
        { "@type": "Offer", "name": "Starter", "price": "49", "priceCurrency": "INR" },
        { "@type": "Offer", "name": "Creator", "price": "99", "priceCurrency": "INR" },
        { "@type": "Offer", "name": "Pro", "price": "199", "priceCurrency": "INR" }
      ]
    }
    </script>

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is my video data safe with ClearVoice AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. All processing happens in your browser. Your video never leaves your device or gets uploaded to any server."
          }
        },
        {
          "@type": "Question",
          "name": "What types of background noise can ClearVoice AI remove?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ClearVoice AI removes wind, traffic, HVAC hum, echo, reverb, crowd noise, electrical hum, and other environmental background noise."
          }
        },
        {
          "@type": "Question",
          "name": "What video and audio formats are supported?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MP4, MOV, MKV video formats and MP3, WAV audio files. Paid plans unlock additional export formats."
          }
        },
        {
          "@type": "Question",
          "name": "How long does noise removal take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most videos under 5 minutes process in 1–3 minutes. GPU-enabled devices are significantly faster."
          }
        },
        {
          "@type": "Question",
          "name": "What AI model does ClearVoice AI use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ClearVoice AI uses Demucs v4 (htdemucs) by Meta AI Research combined with a Wiener filter for residual cleanup. All models run locally via ONNX Runtime Web."
          }
        }
      ]
    }
    </script>

    <!-- Fonts: trimmed to 3 families, display=swap prevents render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Theme: set before paint to prevent flash of wrong color scheme -->
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
